apiVersion: 1

datasources:
  - name: InfluxDB_v2_Flux
    uid: InfluxDB_v2_Flux
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    isDefault: true
    jsonData:
      version: Flux
      organization: ipset
      defaultBucket: cm4000_data
      tlsSkipVerify: false
    secureJsonData:
      token: my-super-secret-auth-token
